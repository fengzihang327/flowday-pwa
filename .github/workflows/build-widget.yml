name: Build Widget APK

on:
  push:
    paths:
      - 'android-widget/**'
      - '.github/workflows/build-widget.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: android-widget
        run: gradle wrapper

      - name: Build APK
        working-directory: android-widget
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowdayWidget-APK
          path: android-widget/app/build/outputs/apk/debug/*.apk
