<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101112">
  <title>Flowday 小组件</title>
  <style>
    :root{--ink:#151718;--lime:#d9f75b;--muted:#7c817f;--paper:#fff;--cream:#f7f8f5;--line:#e8ebe7}
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--ink);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 8px;
    }
    .widget{
      width: 100%;
      max-width: 380px;
      background: linear-gradient(145deg, #1a1d1c 0%, #151718 100%);
      border-radius: 28px;
      padding: 22px 20px 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      position: relative;
      overflow: hidden;
    }
    .widget::before{
      content:"";
      position:absolute;
      width:120px;height:120px;
      border-radius:50%;
      border:20px solid rgba(217,247,91,.08);
      top:-50px;right:-40px;
    }
    .widget-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
      position:relative;z-index:1;
    }
    .widget-brand{
      display:flex;align-items:center;gap:7px;
      font-weight:800;font-size:15px;letter-spacing:-.04em;
    }
    .widget-mark{
      width:22px;height:22px;border-radius:7px 7px 7px 2px;
      background:var(--lime);display:grid;place-items:center;
      font-size:12px;color:var(--ink);transform:rotate(-8deg);
    }
    .widget-date{font-size:11px;color:#8a908c}
    .progress-section{
      display:flex;align-items:center;gap:16px;
      margin-bottom:16px;position:relative;z-index:1;
    }
    .mini-ring{
      width:56px;height:56px;border-radius:50%;
      display:grid;place-items:center;
      background:conic-gradient(var(--lime) 0 0%,#3d4341 0 100%);
      flex-shrink:0;
    }
    .mini-ring::after{
      content:"";width:42px;height:42px;
      border-radius:50%;background:var(--ink);position:absolute;
    }
    .mini-ring strong{font-size:15px;z-index:1;position:relative}
    .progress-info{flex:1}
    .progress-info .big{font-size:24px;font-weight:800;letter-spacing:-.05em}
    .progress-info .sub{font-size:11px;color:#8a908c;margin-top:2px}
    .task-list{display:flex;flex-direction:column;gap:7px;position:relative;z-index:1}
    .task-row{
      display:flex;align-items:center;gap:9px;
      padding:9px 10px;border-radius:11px;
      background:rgba(255,255,255,.04);
      font-size:12px;
    }
    .task-row.done .task-label{text-decoration:line-through;color:#5a605e}
    .task-dot{
      width:16px;height:16px;border-radius:50%;
      border:1.5px solid #4a504e;flex-shrink:0;
      display:grid;place-items:center;font-size:10px;
    }
    .task-row.done .task-dot{background:var(--lime);border-color:var(--lime);color:var(--ink)}
    .task-label{flex:1;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .task-time{font-size:10px;color:#6a706d;flex-shrink:0}
    .empty-widget{
      text-align:center;padding:18px 8px;
      color:#5a605e;font-size:12px;line-height:1.6;
      position:relative;z-index:1;
    }
    .widget-footer{
      margin-top:14px;text-align:center;
      position:relative;z-index:1;
    }
    .widget-footer a{
      color:var(--lime);font-size:10px;font-weight:700;
      text-decoration:none;letter-spacing:.04em;
    }
    .widget-tap-area{
      position:absolute;inset:0;z-index:2;
      /* Transparent tap target to open app */
    }
  </style>
</head>
<body>
  <div class="widget" id="widgetRoot">
    <div class="widget-header">
      <div class="widget-brand"><span class="widget-mark">✦</span> flowday</div>
      <span class="widget-date" id="widgetDate"></span>
    </div>
    <div class="progress-section">
      <div class="mini-ring" id="miniRing"><strong id="miniPercent">0%</strong></div>
      <div class="progress-info">
        <div class="big" id="miniDone">0 / 0</div>
        <div class="sub" id="miniMsg">开始安排这一天</div>
      </div>
    </div>
    <div class="task-list" id="widgetTasks"></div>
    <div class="widget-footer">
      <a href="./time-planner.html">打开 Flowday →</a>
    </div>
  </div>
  <script>
    // Read from localStorage (shared with main app)
    const dateKey = (() => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    })();

    const weekdays = ['日','一','二','三','四','五','六'];
    const today = new Date();
    const dateStr = `星期${weekdays[today.getDay()]} · ${today.getMonth()+1}/${today.getDate()}`;

    try {
      const plans = JSON.parse(localStorage.getItem('flowday-plans') || '{}');
      const tasks = plans[dateKey] || [];
      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      const percent = total ? Math.round(done/total*100) : 0;

      document.getElementById('widgetDate').textContent = dateStr;
      document.getElementById('miniPercent').textContent = percent + '%';
      document.getElementById('miniDone').textContent = `${done} / ${total}`;
      document.getElementById('miniMsg').textContent = !total ? '暂无任务' : percent===100 ? '全部完成 🎉' : `${total-done} 项待完成`;
      document.getElementById('miniRing').style.background = `conic-gradient(#d9f75b 0 ${percent}%,#3d4341 ${percent}% 100%)`;

      const list = document.getElementById('widgetTasks');
      if (!tasks.length) {
        list.innerHTML = '<div class="empty-widget">今天还没有安排<br>打开 Flowday 规划一天吧</div>';
      } else {
        const showTasks = tasks.slice(0, 4); // Max 4 tasks in widget
        list.innerHTML = showTasks.map(t => `
          <div class="task-row ${t.done?'done':''}">
            <div class="task-dot">${t.done?'✓':''}</div>
            <span class="task-label">${escapeHtml(t.title)}</span>
            <span class="task-time">${t.time!=='待安排'?t.time:''}</span>
          </div>
        `).join('');
        if (tasks.length > 4) {
          list.innerHTML += `<div style="font-size:10px;color:#6a706d;text-align:center;padding:4px">还有 ${tasks.length-4} 项…</div>`;
        }
      }
    } catch(e) {
      document.getElementById('widgetTasks').innerHTML = '<div class="empty-widget">无法加载任务<br>请打开 Flowday 应用</div>';
    }

    function escapeHtml(v) {
      return v.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    }

    // Tap anywhere to open full app
    document.getElementById('widgetRoot').addEventListener('click', () => {
      window.open('./time-planner.html', '_top');
    });
  </script>
</body>
</html>
